<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Foto ansehen - My own Social Media</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="CSS_Social-Media.css">
    <link rel="stylesheet" href="CSS_Foto-Oeffnen.css">
</head>

<body>
    <main>
        <div class="foto-Header">
        <a href="Social-Media-Code.html" class="zurueck-Link">⟵</a><!--Pfeil zurück-->
            <div class="anzeige_Reihe"><!--Anzeige, bei welchem Bild man ist-->
                <span class="anzeige" data-index="0"></span>
                <span class="anzeige" data-index="1"></span>
                <span class="anzeige" data-index="2"></span>
                <span class="anzeige" data-index="3"></span>
                <span class="anzeige" data-index="4"></span>
                <span class="anzeige" data-index="5"></span>
                <span class="anzeige" data-index="6"></span>
                <span class="anzeige" data-index="7"></span>
            </div>
        </div>

        <div class="foto-Ansicht">
           <img id="detailBild" class="detail-Bild" src="" alt="">

            <!--Icons-->
            <div class="icon-spalte">
                <button class="icon-knopf" id="likeKnopf">
                    <img src="Bilder/Herz-grau.png" alt="Like">
                </button>

                <button class="icon-knopf" id="commentKnopf">
                    <img src="Bilder/Kommentar.png" alt="Kommentieren">
                </button>

                <button class="icon-knopf" id="saveKnopf">
                    <img src="Bilder/Speichern.png" alt="Speichern">
                </button>

                <button class="icon-knopf" id="shareKnopf">
                    <img src="Bilder/Teilen.png" alt="Teilen">
                </button>
            </div>

            <!--Pfeile links/rechts-->
            <button class="nav-button nav-left" id="previous">❮</button>
            <button class="nav-button nav-right" id="next">❯</button>

            <!--Kommentarbereich-->
            <div class="comment-overlay" id="commentSection">
                <div class="comment-inner">
                    <div class="comment-header-row">
                        <h2>Kommentare</h2>
                        <button class="comment-close" id="commentCloseKnopf">x</button>
                    </div>
                    <div class="comments-list" id="commentsList"></div>
                        <form id="commentForm">
                            <input type="text" id="commentInput" placeholder="Kommentar schreiben..." required>
                            <button type="submit">Posten</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>       
    </main>

    <script src="funktion-Social-Media.js"></script>
</body>
</html>
