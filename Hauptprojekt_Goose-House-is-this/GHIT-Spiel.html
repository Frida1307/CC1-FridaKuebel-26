<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="GHIT-Spiel.css">
	<script src="GHIT-Spiel.js" defer></script>
    <title>Goose House is this?</title>
</head>
<body>
    <div id="hintergrund">
        <img src="Bilder/Hintergrund.png">
        <div id="hauptbereich">
            <!--Auwahlbereich:-->
            <div class="auswahl">
                <div id="auswahlHaus">
                </div>
                <div id="auswahlFarben">
                </div>
            </div>
            <!--Auwahl-Pfeile:-->
            <input type="imgage" id="auswahlZurueckKnopf" class="pfeil" src="Bilder/Pfeil-Links.png" alt="Zurück">
            <input type="imgage" id="auswahlWeiterKnopf" class="pfeil" src="Bilder/Pfeil-Rechts.png" alt="Weiter">



            <div id="bildschirm">
                <div id="sprachAusgabe">
                    <div class="profilGans"></div>
                </div>
                <div id="platzierbereich"></div>
            </div>

        </div>
        <div class="uebersichtKnoepfe">
            <div id="enter"></div>
            <div id="oben"></div>
            <div id="unten"></div>
            <div id="rechts"></div>
            <div id="links"></div>
        </div>
        <div id="einstellung"></div>
        <div class="hilfe"></div>
    </div>
</body>
</html>
